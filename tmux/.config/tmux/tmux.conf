# rebind prefix key
unbind C-b
set -g prefix C-a

# enable mouse mode
set -g mouse on

# set history limit
set -g history-limit 100000

# copy mode settings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel  # note: need `xclip`
